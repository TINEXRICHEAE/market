{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Details</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .back-button { background: white; padding: .75rem 1.5rem; border-radius: 5px; margin-bottom: 1rem; display: inline-block; text-decoration: none; color: #667eea; font-weight: 600; transition: all .3s; }
        .back-button:hover { background: #f0f0f0; }
        .order-detail-container { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        .order-section { background: white; border-radius: 10px; padding: 2rem; box-shadow: 0 2px 10px rgba(0,0,0,.1); margin-bottom: 1.5rem; }
        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.25rem; color: #333; }
        .order-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1.5rem; border-bottom: 2px solid #f0f0f0; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem; }
        .order-number { font-size: 1.5rem; font-weight: bold; color: #667eea; }
        .order-info-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 1.5rem; }
        .info-item { display: flex; flex-direction: column; gap: .4rem; }
        .info-label { font-size: .85rem; color: #666; }
        .info-value { font-size: 1rem; font-weight: 600; color: #333; }
        .order-item { display: flex; gap: 1rem; padding: 1rem; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: .75rem; align-items: flex-start; }
        .item-image { width: 72px; height: 72px; object-fit: cover; border-radius: 6px; background: #f0f0f0; flex-shrink: 0; }
        .item-details { flex: 1; min-width: 0; }
        .item-name { font-weight: 600; color: #333; margin-bottom: .2rem; }
        .item-seller, .item-quantity { color: #666; font-size: .85rem; }
        .item-payment-info { display: flex; gap: .4rem; margin-top: .5rem; flex-wrap: wrap; }
        .payment-badge { font-size: .7rem; padding: .2rem .5rem; border-radius: 10px; font-weight: 700; }
        .payment-online  { background: #e7f3ff; color: #004085; }
        .payment-cash    { background: #f8f9fa; color: #495057; }
        .status-paid     { background: #d1e7dd; color: #0f5132; }
        .status-deposited{ background: #ede7f6; color: #4a148c; }
        .status-pending  { background: #fff3cd; color: #856404; }
        .item-price-section { text-align: right; flex-shrink: 0; }
        .item-unit-price { color: #666; font-size: .8rem; }
        .item-subtotal   { font-weight: bold; color: #667eea; font-size: 1rem; margin-top: .2rem; }
        .deposit-actions { display: flex; gap: .6rem; margin-top: .75rem; padding-top: .75rem; border-top: 1px solid #e8d5ff; flex-wrap: wrap; }
        .btn-complete { background: #667eea; color: white; border: none; border-radius: 6px; padding: .5rem 1rem; font-size: .8rem; font-weight: 700; cursor: pointer; }
        .btn-complete:hover { background: #5568d4; }
        .btn-complete:disabled { background: #bbb; cursor: not-allowed; }
        .btn-cancel-deposit { background: white; color: #c0392b; border: 1.5px solid #c0392b; border-radius: 6px; padding: .5rem 1rem; font-size: .8rem; font-weight: 700; cursor: pointer; }
        .btn-cancel-deposit:hover { background: #fdf0ee; }
        .btn-cancel-deposit:disabled { color: #bbb; border-color: #bbb; cursor: not-allowed; }
        .alert { padding: 1rem 1.25rem; border-radius: 8px; margin-bottom: 1.25rem; }
        .alert-deposit { background: #ede7f6; border-left: 4px solid #7c4dff; }
        .alert-deposit-title { font-weight: 700; color: #4a148c; margin-bottom: .3rem; font-size: .95rem; }
        .alert-deposit-text  { font-size: .85rem; color: #6a1b9a; }
        .alert-pending { background: #fff3cd; border-left: 4px solid #ff9800; }
        .alert-pending-title { font-weight: 700; color: #856404; margin-bottom: .3rem; font-size: .95rem; }
        .alert-pending-text  { font-size: .85rem; color: #856404; }
        .summary-section { background: white; border-radius: 10px; padding: 2rem; box-shadow: 0 2px 10px rgba(0,0,0,.1); height: fit-content; position: sticky; top: 2rem; }
        .summary-row { display: flex; justify-content: space-between; padding: .6rem 0; border-bottom: 1px solid #f0f0f0; font-size: .9rem; }
        .summary-row:last-child { border-bottom: none; padding-top: 1rem; font-size: 1.2rem; font-weight: 700; }
        .summary-label { color: #666; }
        .summary-value { font-weight: 600; color: #333; }
        .total-value   { color: #667eea; }
        .btn-primary { background: linear-gradient(135deg,#667eea,#764ba2); color: white; border: none; border-radius: 6px; width: 100%; padding: .85rem; font-size: .9rem; font-weight: 700; cursor: pointer; margin-top: 1rem; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,.35); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .seller-payment { background: #f9f9f9; border: 1px solid #eee; padding: 1rem; border-radius: 8px; margin-bottom: .75rem; }
        .seller-payment-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: .75rem; flex-wrap: wrap; gap: .5rem; }
        .seller-name { font-weight: 600; color: #333; }
        .seller-payment-summary { display: flex; justify-content: space-between; align-items: center; padding-top: .75rem; border-top: 1px solid #e0e0e0; margin-top: .5rem; }

        /* ── ZKP mini-badge (inline in seller breakdown) ── */
        .zkp-mini {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 9px; border-radius: 20px; font-size: 0.7rem; font-weight: 700;
            border: 1.5px solid transparent; cursor: default;
            white-space: nowrap;
        }
        .zkp-mini.state-loading   { background: #f5f5f5; border-color: #ddd; color: #999; }
        .zkp-mini.state-verified  { background: #e8f5e9; border-color: #66bb6a; color: #2e7d32; }
        .zkp-mini.state-unverified{ background: #fff3e0; border-color: #ffa726; color: #e65100; }
        .zkp-mini.state-failed    { background: #fce4ec; border-color: #ef5350; color: #b71c1c; }
        .zkp-mini.state-down      { background: #f5f5f5; border-color: #bdbdbd; color: #9e9e9e; }
        .zkp-mini-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .state-loading  .zkp-mini-dot { background: #bdbdbd; animation: blink 1s infinite; }
        .state-verified .zkp-mini-dot { background: #43a047; }
        .state-unverified .zkp-mini-dot { background: #fb8c00; }
        .state-failed   .zkp-mini-dot { background: #e53935; }
        .btn-zkp-mini-proof {
            background: none; border: none; cursor: pointer;
            font-size: 0.68rem; color: #2e7d32; text-decoration: underline;
            padding: 0; margin-left: 4px;
        }
        @keyframes blink   { 0%,100%{opacity:1} 50%{opacity:0.2} }
        @keyframes spin-kf { to{transform:rotate(360deg)} }

        /* ── Proof Modal ── */
        .proof-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:700; align-items:center; justify-content:center; padding:1rem; }
        .proof-overlay.open { display:flex; }
        .proof-modal { background:white; border-radius:12px; padding:1.75rem; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; box-shadow:0 24px 60px rgba(0,0,0,.25); }
        .proof-modal-hdr { display:flex; align-items:center; gap:.75rem; margin-bottom:1.25rem; padding-bottom:1rem; border-bottom:2px solid #f0f0f0; }
        .proof-modal-title { font-size:1rem; font-weight:700; flex:1; }
        .proof-modal-close { background:none;border:none;cursor:pointer;font-size:1.3rem;color:#999;padding:2px 6px;border-radius:4px; }
        .proof-modal-close:hover { color:#333; }
        .proof-status-banner { padding:.75rem 1rem; border-radius:8px; margin-bottom:1.25rem; font-size:.85rem; font-weight:600; }
        .proof-status-banner.ok  { background:#e8f5e9; color:#2e7d32; }
        .proof-status-banner.bad { background:#fce4ec; color:#b71c1c; }
        .proof-field { margin-bottom:.85rem; }
        .proof-field-lbl { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:#999; margin-bottom:.25rem; }
        .proof-field-val { font-size:.8rem; font-weight:600; color:#333; background:#f8f8f8; padding:.45rem .65rem; border-radius:6px; word-break:break-all; font-family:'Courier New',monospace; }
        .proof-loading-wrap { text-align:center; padding:2.5rem; color:#888; }
        .proof-spinner { display:inline-block; width:26px; height:26px; border:3px solid #eee; border-top-color:#667eea; border-radius:50%; animation:spin-kf .8s linear infinite; margin-bottom:.75rem; }

        /* ── PIN modal / existing styles ── */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:500; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal-box { background:white; border-radius:12px; padding:2rem; width:100%; max-width:360px; box-shadow:0 20px 60px rgba(0,0,0,.3); }
        .modal-title { font-size:1.1rem; font-weight:700; margin-bottom:.3rem; }
        .modal-subtitle { font-size:.85rem; color:#666; margin-bottom:1.5rem; }
        .modal-item-info { background:#f5f5f5; border-radius:6px; padding:.75rem 1rem; margin-bottom:1.25rem; font-size:.85rem; color:#555; }
        .pin-row { display:flex; gap:.5rem; justify-content:center; margin-bottom:1.25rem; }
        .pin-digit { width:52px; height:52px; border:2px solid #ddd; border-radius:8px; font-size:1.5rem; text-align:center; font-weight:700; outline:none; }
        .pin-digit:focus { border-color:#667eea; }
        .modal-status { font-size:.85rem; text-align:center; margin-bottom:1rem; min-height:1.2em; color:#c0392b; }
        .modal-status.ok { color:#27ae60; }
        .modal-buttons { display:flex; gap:.75rem; }
        .modal-btn-confirm { flex:1; background:#667eea; color:white; border:none; border-radius:6px; padding:.75rem; font-weight:700; font-size:.9rem; cursor:pointer; }
        .modal-btn-confirm:hover { background:#5568d4; }
        .modal-btn-confirm:disabled { background:#bbb; cursor:not-allowed; }
        .modal-btn-cancel  { flex:1; background:white; color:#555; border:1.5px solid #ddd; border-radius:6px; padding:.75rem; font-weight:700; font-size:.9rem; cursor:pointer; }
        .modal-btn-cancel:hover { background:#f5f5f5; }

        .loading { text-align:center; padding:3rem; font-size:1.1rem; color:#666; }
        .toast { position:fixed; bottom:2rem; right:2rem; color:white; padding:.9rem 1.5rem; border-radius:8px; opacity:0; transform:translateY(16px); transition:all .3s; z-index:600; font-weight:600; font-size:.9rem; }
        .toast.show { opacity:1; transform:translateY(0); }
        .toast.success { background:#27ae60; }
        .toast.error   { background:#e74c3c; }
        .toast.info    { background:#667eea; }
        @media(max-width:768px){ .order-detail-container{grid-template-columns:1fr;} .order-info-grid{grid-template-columns:1fr;} .order-item{flex-wrap:wrap;} .item-price-section{text-align:left;width:100%;} }
    </style>
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}" />
</head>
<body>
{% include "navbar_base.html" %}

<div class="container">
    <a href="/orders/" class="back-button">← Back to Orders</a>
    <a href="/order/{{ order_id }}/tracking/" class="back-button">Track →</a>
    <div id="orderContainer"><div class="loading">Loading order details…</div></div>
</div>

<!-- PIN Modal (unchanged) -->
<div class="modal-overlay" id="pinModal">
    <div class="modal-box">
        <div class="modal-title" id="modalTitle">Confirm Payment</div>
        <div class="modal-subtitle" id="modalSubtitle">Enter your 4-digit wallet PIN to proceed</div>
        <div class="modal-item-info" id="modalItemInfo"></div>
        <div class="pin-row">
            <input type="password" maxlength="1" class="pin-digit" id="pd1" inputmode="numeric" autocomplete="off"/>
            <input type="password" maxlength="1" class="pin-digit" id="pd2" inputmode="numeric" autocomplete="off"/>
            <input type="password" maxlength="1" class="pin-digit" id="pd3" inputmode="numeric" autocomplete="off"/>
            <input type="password" maxlength="1" class="pin-digit" id="pd4" inputmode="numeric" autocomplete="off"/>
        </div>
        <div class="modal-status" id="modalStatus"></div>
        <div class="modal-buttons">
            <button class="modal-btn-cancel" id="modalCancelBtn" onclick="closeModal()">Cancel</button>
            <button class="modal-btn-confirm" id="modalConfirmBtn" onclick="submitModal()">Confirm</button>
        </div>
    </div>
</div>

<!-- Proof Modal -->
<div class="proof-overlay" id="proofOverlay">
    <div class="proof-modal">
        <div class="proof-modal-hdr">
            <div class="proof-modal-title" id="proofModalTitle">Seller Verification Proof</div>
            <button class="proof-modal-close" onclick="closeProofModal()">✕</button>
        </div>
        <div id="proofModalBody">
            <div class="proof-loading-wrap"><div class="proof-spinner"></div><div>Loading…</div></div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>
<script src="{% static 'js/navbar.js' %}"></script>

<script>
const ORDER_ID = '{{ order_id }}';
let currentOrder = null;
let modalContext  = null;

// ═══ ZKP badge cache ═══════════════════════════════════════════════
const zkpCache = {};

async function loadZkpBadge(sellerId) {
    if (!sellerId) return;
    try {
        const r    = await fetch(`/api/seller-verification-status/${sellerId}/`,
                                 { headers:{'X-Requested-With':'XMLHttpRequest'} });
        const data = await r.json();
        zkpCache[sellerId] = data;
        // Update all mini-badges for this seller (there may be >1 if seller appears in multiple sections)
        document.querySelectorAll(`.zkp-mini[data-seller-id="${sellerId}"]`).forEach(el => {
            applyZkpMini(el, data, sellerId);
        });
    } catch {
        document.querySelectorAll(`.zkp-mini[data-seller-id="${sellerId}"]`).forEach(el => {
            setZkpMiniState(el, 'down', '⚠ Unavailable');
        });
    }
}

function applyZkpMini(el, data, sellerId) {
    const proofLink = el.parentElement?.querySelector(`.btn-zkp-mini-proof[data-seller-id="${sellerId}"]`);
    if (!data.kyc_approved) { setZkpMiniState(el, 'unverified', '✗ Not verified'); return; }
    if (data.zkp_status === 'registered' && data.zkp_valid) {
        setZkpMiniState(el, 'verified', '✓ ZKP Verified');
        if (proofLink) proofLink.style.display = '';
        return;
    }
    if (data.zkp_status === 'registered' && !data.zkp_valid) {
        setZkpMiniState(el, 'failed', '⚠ Proof Failed'); return;
    }
    setZkpMiniState(el, 'unverified', '⏳ Pending ZKP');
}

function setZkpMiniState(el, state, text) {
    el.className = `zkp-mini state-${state}`;
    const dot = el.querySelector('.zkp-mini-dot');
    const lbl = el.querySelector('.zkp-mini-lbl');
    if (lbl) lbl.textContent = text;
}

// ═══ Proof modal ════════════════════════════════════════════════════
function openProofModal(sellerId, sellerEmail) {
    document.getElementById('proofModalTitle').textContent = `🔍 Seller Proof — ${sellerEmail}`;
    document.getElementById('proofOverlay').classList.add('open');
    renderProof(sellerId, sellerEmail);
}
function closeProofModal() {
    document.getElementById('proofOverlay').classList.remove('open');
}
document.getElementById('proofOverlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeProofModal();
});
async function renderProof(sellerId, sellerEmail) {
    const body = document.getElementById('proofModalBody');
    body.innerHTML = `<div class="proof-loading-wrap"><div class="proof-spinner"></div><div>Checking seller verification…</div></div>`;

    let data;
    try {
        const r = await fetch(`/api/seller-verification-status/${sellerId}/?refresh=1`,
                              { headers:{'X-Requested-With':'XMLHttpRequest'} });
        data = await r.json();
        zkpCache[sellerId] = data;
    } catch {
        body.innerHTML = `<div class="proof-status-banner bad">⚠ Could not reach verification service</div>`;
        return;
    }

    const ok = data.zkp_valid;
    const bizName = data.business_name || sellerEmail;

    body.innerHTML = `
        <div class="proof-status-banner ${ok ? 'ok' : 'bad'}">
            ${ok ? '✅ This seller is identity-verified and approved to trade on the platform'
                 : '⚠ Seller verification could not be confirmed — proceed with caution'}
        </div>

        <div class="proof-field">
            <div class="proof-field-lbl">Seller</div>
            <div class="proof-field-val" style="font-family:inherit;">${bizName}</div>
        </div>

        <div class="proof-field">
            <div class="proof-field-lbl">Identity Check</div>
            <div class="proof-field-val" style="font-family:inherit;">
                ${data.kyc_approved ? '✓ Government ID and business details reviewed and approved by platform admin' : '✗ Not yet verified'}
            </div>
        </div>

        <div class="proof-field">
            <div class="proof-field-lbl">Cryptographic Verification</div>
            <div class="proof-field-val" style="font-family:inherit;">
                ${data.zkp_status === 'registered'
                    ? '✓ Seller identity is cryptographically registered — verified without exposing personal data'
                    : data.zkp_status === 'failed'
                    ? '✗ Registration failed'
                    : '⏳ Pending registration'}
            </div>
        </div>

        ${data.verified_at ? `
        <div class="proof-field">
            <div class="proof-field-lbl">Last Verified</div>
            <div class="proof-field-val" style="font-family:inherit;">${new Date(data.verified_at).toLocaleString()}</div>
        </div>` : ''}

        <div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid #f0f0f0;font-size:0.72rem;color:#aaa;line-height:1.7;">
            🔒 <strong>How this works:</strong> The seller's identity documents were reviewed by a platform admin.
            After approval, a cryptographic proof was generated that confirms the seller is legitimate
            — without revealing any personal details to you. This uses zero-knowledge proof technology.
        </div>`;
}
// ═══════════════════════════════════════════════════════════════════
// LOAD ORDER  (original)
// ═══════════════════════════════════════════════════════════════════
async function loadOrderDetail() {
    try {
        const r    = await fetch(`/api/orders/${ORDER_ID}/`);
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Failed to load order');
        currentOrder = data.order;
        displayOrderDetail(data.order);
    } catch (e) {
        document.getElementById('orderContainer').innerHTML =
            `<div class="loading" style="color:#c0392b;">Failed to load: ${e.message}</div>`;
    }
}

// ═══════════════════════════════════════════════════════════════════
// RENDER  (original + ZKP injected into seller breakdown)
// ═══════════════════════════════════════════════════════════════════
function displayOrderDetail(order) {
    const cnt = document.getElementById('orderContainer');
    const depositedItems = order.items.filter(i => i.is_deposited);
    const pendingItems   = order.items.filter(i => i.payment_status === 'pending' && i.can_pay_online);

    const depositAlert = depositedItems.length > 0 ? `
        <div class="alert alert-deposit">
            <div class="alert-deposit-title">🔒 ${depositedItems.length} item${depositedItems.length!==1?'s':''} with reserved funds</div>
            <div class="alert-deposit-text">Funds are secured. Complete to send to seller, or cancel to release.</div>
        </div>` : '';

    const pendingAlert = pendingItems.length > 0 ? `
        <div class="alert alert-pending">
            <div class="alert-pending-title">⚠️ ${pendingItems.length} item${pendingItems.length!==1?'s':''} awaiting payment</div>
            <div class="alert-pending-text">Select items below and click Pay to complete.</div>
        </div>` : '';

    const depositedSection = depositedItems.length > 0 ? `
        <div class="order-section">
            <div class="section-title">🔒 Funds Reserved — Action Required</div>
            ${depositedItems.map(item => buildDepositedItemCard(item)).join('')}
        </div>` : '';

    const pendingSection = pendingItems.length > 0 ? `
        <div class="order-section">
            <div class="section-title">💳 Pay Now</div>
            <div style="margin-bottom:.75rem;padding:.65rem .9rem;background:#e7f3ff;border-radius:6px;font-size:.85rem;color:#004085;">
                💡 Select items to pay for online
            </div>
            ${pendingItems.map(item => buildPendingItemCard(item)).join('')}
        </div>` : '';

    cnt.innerHTML = `
        <div class="order-detail-container">
            <div>
                ${depositAlert}${pendingAlert}
                <div class="order-section">
                    <div class="order-header">
                        <div>
                            <div class="order-number">${order.order_number}</div>
                            <div style="margin-top:.4rem;font-size:.85rem;color:#666;">${order.payment_method_display}</div>
                        </div>
                    </div>
                    <div class="order-info-grid">
                        <div class="info-item"><span class="info-label">Order Date</span><span class="info-value">${new Date(order.created_at).toLocaleDateString()}</span></div>
                        <div class="info-item"><span class="info-label">Last Updated</span><span class="info-value">${new Date(order.updated_at).toLocaleDateString()}</span></div>
                        <div class="info-item"><span class="info-label">Total Items</span><span class="info-value">${order.items.length}</span></div>
                        <div class="info-item"><span class="info-label">Total Amount</span><span class="info-value">UGX ${fmt(order.total_amount)}</span></div>
                    </div>
                </div>
                ${depositedSection}
                ${pendingSection}
                <div class="order-section">
                    <div class="section-title">Payment by Seller</div>
                    ${order.seller_payments.map(s => buildSellerBreakdown(s, order)).join('')}
                </div>
            </div>
            <div class="summary-section">
                <div class="section-title">Order Summary</div>
                <div class="summary-row"><span class="summary-label">Subtotal</span><span class="summary-value">UGX ${fmt(order.total_amount)}</span></div>
                <div class="summary-row"><span class="summary-label">Shipping</span><span class="summary-value">Free</span></div>
                <div class="summary-row"><span class="summary-label">Tax</span><span class="summary-value">UGX 0</span></div>
                <div class="summary-row"><span class="summary-label">Total</span><span class="summary-value total-value">UGX ${fmt(order.total_amount)}</span></div>
                ${pendingItems.length > 0 ? `
                    <div style="margin-top:1rem;padding:.9rem;background:#f8f9fa;border-radius:6px;">
                        <div style="font-size:.85rem;color:#666;margin-bottom:.4rem;">Selected for payment:</div>
                        <div style="font-size:1.15rem;font-weight:700;color:#667eea;" id="selectedTotal">UGX ${fmt(pendingItems.reduce((s,i)=>s+parseFloat(i.subtotal),0))}</div>
                        <div style="font-size:.8rem;color:#888;margin-top:.2rem;" id="selectedCount">${pendingItems.length} item${pendingItems.length!==1?'s':''} selected</div>
                    </div>
                    <button class="btn-primary" id="payNowBtn" onclick="processSelectedPayment()">💳 Pay Selected Items</button>
                ` : ''}
                ${depositedItems.length > 0 ? `
                    <div style="margin-top:1rem;padding:.9rem;background:#ede7f6;border-radius:6px;">
                        <div style="font-size:.8rem;color:#6a1b9a;font-weight:600;margin-bottom:.4rem;">Reserved in wallet</div>
                        <div style="font-size:1.1rem;font-weight:700;color:#4a148c;">UGX ${fmt(depositedItems.reduce((s,i)=>s+parseFloat(i.subtotal),0))}</div>
                        <div style="font-size:.75rem;color:#7b1fa2;margin-top:.3rem;">${depositedItems.length} item${depositedItems.length!==1?'s':''} — complete or cancel per item below</div>
                    </div>
                ` : ''}
            </div>
        </div>`;

    document.querySelectorAll('.item-checkbox').forEach(cb => cb.addEventListener('change', updateSelectedTotal));

    // ── Load ZKP badges for every unique seller in this order ──────
    const sellerIds = new Set();
    order.seller_payments.forEach(s => { if (s.seller_id) sellerIds.add(s.seller_id); });
    sellerIds.forEach(id => loadZkpBadge(id));
    sellerIds.forEach(id => loadBalanceTier(id));
}

async function loadBalanceTier(sellerEmail, sellerId) {
    const el = document.getElementById(`tier-badge-${sellerId}`);
    if (!el) return;

    try {
        const r = await fetch(`/order/${currentOrder.order_number}/balance-status/?seller_email=${encodeURIComponent(sellerEmail)}`,
                              { headers: {'X-Requested-With': 'XMLHttpRequest'} });
        const data = await r.json();

        const tier = data.tier_result || 'unknown';
        const cfg = {
            green:   { cls: 'verified',   text: `✓ Can pay all ${data.total_items} items` },
            amber:   { cls: 'unverified', text: `⚠ Can pay ${data.items_payable} of ${data.total_items} items` },
            red:     { cls: 'failed',     text: `⛔ Cannot pay — insufficient funds` },
            unknown: { cls: 'down',       text: '? Payment capability unknown' },
        }[tier] || { cls: 'down', text: '?' };

        setZkpMiniState(el, cfg.cls, cfg.text);
    } catch {
        setZkpMiniState(el, 'down', '? Unavailable');
    }
}

// ── Seller breakdown — ZKP mini-badge injected next to seller name ─
function buildSellerBreakdown(seller, order) {
    const sellerItems    = order.items.filter(i => i.seller_email === seller.seller_email);
    const paidItems      = sellerItems.filter(i => i.payment_status==='paid'      && i.payment_method==='online');
    const depositedItems = sellerItems.filter(i => i.payment_status==='deposited' && i.payment_method==='online');
    const pendingItems   = sellerItems.filter(i => i.payment_status==='pending'   && i.payment_method==='online');
    const cashItems      = sellerItems.filter(i => i.payment_method==='cash');
    const hasOnline = paidItems.length || depositedItems.length || pendingItems.length;
    const hasCash   = cashItems.length;
    const badgeTxt  = hasOnline&&hasCash ? '📊 Mixed' : hasOnline ? '💳 Online' : '💵 Cash on Delivery';
    const badgeCls  = hasOnline&&hasCash ? 'payment-badge status-pending'
                    : hasOnline          ? 'payment-badge payment-online'
                    :                      'payment-badge payment-cash';

    const sellerId = seller.seller_id || '';

    // ZKP mini-badge HTML — populated async after render
    const zkpMiniHtml = sellerId ? `
        <span class="zkp-mini state-loading" data-seller-id="${sellerId}">
            <span class="zkp-mini-dot"></span>
            <span class="zkp-mini-lbl">Checking…</span>
        </span>
        <button class="btn-zkp-mini-proof" data-seller-id="${sellerId}"
                onclick="openProofModal(${sellerId},'${escJs(seller.seller_email)}')"
                style="display:none">
            View proof
        </button>
    ` : '';
    // ── Balance tier badge (from BalanceProofVerification) ──
    // Loaded async after render via loadBalanceTier()
    const tierBadgeHtml = `
        <div class="zkp-mini state-loading" id="tier-badge-${sellerId}"
             data-seller-email="${escJs(seller.seller_email)}">
            <span class="zkp-mini-dot"></span>
            <span class="zkp-mini-lbl">Checking payment capability…</span>
        </div>
    `;

    const itemRows = sellerItems.map(item => {
        let icon='',text='',color='',bg='',border='';
        if      (item.payment_method==='cash')                                         {icon='💵';text='Cash on Delivery';  color='#004085';bg='#e7f3ff';border='#b8daff';}
        else if (item.payment_method==='online'&&item.payment_status==='paid')         {icon='✅';text='Paid Online';        color='#0f5132';bg='#e7f5ed';border='#c3e6cb';}
        else if (item.payment_method==='online'&&item.payment_status==='deposited')    {icon='🔒';text='Reserved in Wallet'; color='#4a148c';bg='#f3e5f5';border='#ce93d8';}
        else if (item.payment_method==='online'&&item.payment_status==='pending')      {icon='⏳';text='Pending Payment';    color='#856404';bg='#fff3cd';border='#ffeeba';}
        return `<div style="background:${bg};padding:.65rem .75rem;border-radius:5px;margin-bottom:.4rem;border-left:3px solid ${border};">
            <div style="display:flex;justify-content:space-between;align-items:start;gap:.5rem;">
                <div><div style="font-size:.82rem;font-weight:600;color:#333;">${item.product_name}</div>
                     <div style="font-size:.72rem;color:#666;">Qty:${item.quantity}×UGX ${fmt(item.price)}</div></div>
                <div style="font-size:.85rem;font-weight:700;color:#667eea;white-space:nowrap;">UGX ${fmt(item.subtotal)}</div>
            </div>
            <div style="margin-top:.4rem;font-size:.72rem;color:${color};font-weight:600;">${icon} ${text}</div>
        </div>`;
    }).join('');

    const summaryRows = [
        paidItems.length      ? `<div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.2rem;"><span style="color:#0f5132;">✅ Paid (${paidItems.length})</span><span style="font-weight:700;color:#0f5132;">UGX ${fmt(paidItems.reduce((s,i)=>s+parseFloat(i.subtotal),0))}</span></div>` : '',
        depositedItems.length ? `<div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.2rem;"><span style="color:#4a148c;">🔒 Reserved (${depositedItems.length})</span><span style="font-weight:700;color:#4a148c;">UGX ${fmt(depositedItems.reduce((s,i)=>s+parseFloat(i.subtotal),0))}</span></div>` : '',
        pendingItems.length   ? `<div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.2rem;"><span style="color:#856404;">⏳ Pending (${pendingItems.length})</span><span style="font-weight:700;color:#856404;">UGX ${fmt(pendingItems.reduce((s,i)=>s+parseFloat(i.subtotal),0))}</span></div>` : '',
        cashItems.length      ? `<div style="display:flex;justify-content:space-between;font-size:.75rem;"><span style="color:#004085;">💵 Cash (${cashItems.length})</span><span style="font-weight:700;color:#004085;">UGX ${fmt(cashItems.reduce((s,i)=>s+parseFloat(i.subtotal),0))}</span></div>` : '',
    ].filter(Boolean).join('');

    return `<div class="seller-payment">
        <div class="seller-payment-header">
            <div>
                <div class="seller-name">📦 ${seller.seller_email}</div>
                <div style="display:flex;align-items:center;gap:.4rem;margin-top:.35rem;flex-wrap:wrap;">
                    ${zkpMiniHtml}
                </div>
            </div>
            <span class="${badgeCls}">${badgeTxt}</span>
        </div>
        ${itemRows}
        <div style="margin-top:.75rem;padding:.65rem;background:#f8f9fa;border-radius:5px;border:1px solid #e0e0e0;">
            <div style="font-size:.75rem;font-weight:700;color:#666;margin-bottom:.4rem;">Payment Summary</div>
            ${summaryRows}
        </div>
        <div class="seller-payment-summary">
            <span style="font-weight:600;font-size:.9rem;">Total to Seller</span>
            <span style="font-weight:700;color:#667eea;">UGX ${fmt(seller.total_amount)}</span>
        </div>
    </div>`;
}

// ── Deposited / Pending item cards (original, unchanged) ──────────
function buildDepositedItemCard(item) {
    return `<div class="order-item" id="item-card-${item.id}" style="border:2px solid #9c27b0;background:#fdf7ff;">
        <img src="${item.product_image||'https://via.placeholder.com/72x72?text=?'}" alt="${item.product_name}" class="item-image">
        <div class="item-details">
            <div class="item-name">${item.product_name}</div>
            <div class="item-seller">Sold by: ${item.seller_email}</div>
            <div class="item-quantity">Qty: ${item.quantity}</div>
            <div style="margin-top:.4rem;font-size:.8rem;color:#6a1b9a;">🔒 UGX ${fmt(item.subtotal)} reserved</div>
            <div class="item-payment-info">
                <span class="payment-badge payment-${item.payment_method}">${item.payment_method}</span>
                <span class="payment-badge status-${item.payment_status}">${item.payment_status}</span>
            </div>
            <div class="deposit-actions">
                <button class="btn-complete" id="btn-complete-${item.id}" onclick="openModal('complete',${item.id},'${escJs(item.product_name)}',${item.subtotal})">✅ Complete Payment</button>
                <button class="btn-cancel-deposit" id="btn-cancel-${item.id}" onclick="openModal('cancel',${item.id},'${escJs(item.product_name)}',${item.subtotal})">✕ Release Reservation</button>
            </div>
        </div>
        <div class="item-price-section">
            <div class="item-unit-price">UGX ${fmt(item.price)} each</div>
            <div class="item-subtotal">UGX ${fmt(item.subtotal)}</div>
        </div>
    </div>`;
}

function buildPendingItemCard(item) {
    return `<div class="order-item" style="border:2px solid #667eea;">
        <input type="checkbox" class="item-checkbox" data-item-id="${item.id}" data-amount="${item.subtotal}" checked style="width:18px;height:18px;cursor:pointer;margin-top:.25rem;flex-shrink:0;">
        <img src="${item.product_image||'https://via.placeholder.com/72x72?text=?'}" alt="${item.product_name}" class="item-image">
        <div class="item-details">
            <div class="item-name">${item.product_name}</div>
            <div class="item-seller">Sold by: ${item.seller_email}</div>
            <div class="item-quantity">Qty: ${item.quantity}</div>
            <div style="margin-top:.4rem;font-size:.8rem;color:#667eea;">✓ Online payment available</div>
            <div class="item-payment-info">
                <span class="payment-badge payment-${item.payment_method}">${item.payment_method}</span>
                <span class="payment-badge status-${item.payment_status}">${item.payment_status}</span>
            </div>
        </div>
        <div class="item-price-section">
            <div class="item-unit-price">UGX ${fmt(item.price)} each</div>
            <div class="item-subtotal">UGX ${fmt(item.subtotal)}</div>
        </div>
    </div>`;
}

// ── Pending payment flow (original, unchanged) ────────────────────
function updateSelectedTotal() {
    const cbs   = document.querySelectorAll('.item-checkbox:checked');
    const total = Array.from(cbs).reduce((s,c)=>s+parseFloat(c.dataset.amount),0);
    const tEl   = document.getElementById('selectedTotal');
    const cEl   = document.getElementById('selectedCount');
    const btn   = document.getElementById('payNowBtn');
    if (tEl) tEl.textContent = `UGX ${fmt(total)}`;
    if (cEl) cEl.textContent = `${cbs.length} item${cbs.length!==1?'s':''} selected`;
    if (btn) { btn.disabled = cbs.length===0; btn.style.opacity = cbs.length===0?'0.5':'1'; }
}

async function processSelectedPayment() {
    const cbs = document.querySelectorAll('.item-checkbox:checked');
    if (!cbs.length) { showToast('Select at least one item','error'); return; }
    const itemIds = Array.from(cbs).map(c=>parseInt(c.dataset.itemId));
    const btn = document.getElementById('payNowBtn');
    btn.disabled=true; btn.textContent='Processing…';
    try {
        const r = await fetch(`/api/orders/${ORDER_ID}/pay-selected-items/`,{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':csrfToken},body:JSON.stringify({item_ids:itemIds})});
        const d = await r.json();
        if (r.ok&&d.success) { showToast(`Redirecting…`,'info'); setTimeout(()=>{window.location.href=`/payment/process/${d.payment_request_id}/`;},500); }
        else { showToast(d.error||'Failed','error'); btn.disabled=false; btn.textContent='💳 Pay Selected Items'; }
    } catch { showToast('Network error','error'); btn.disabled=false; btn.textContent='💳 Pay Selected Items'; }
}

// ── PIN Modal (original, unchanged) ──────────────────────────────
function openModal(action,orderItemId,productName,amount) {
    modalContext = {action,orderItemId,productName,amount};
    const isComplete = action==='complete';
    document.getElementById('modalTitle').textContent    = isComplete ? '✅ Complete Payment' : '✕ Release Reservation';
    document.getElementById('modalSubtitle').textContent = isComplete ? 'Transfer reserved funds to the seller' : 'Release the reserved funds back to your free balance';
    document.getElementById('modalItemInfo').innerHTML   = `<strong>${productName}</strong><br>Amount: <strong>UGX ${fmt(amount)}</strong>`;
    document.getElementById('modalStatus').textContent   = '';
    document.getElementById('modalStatus').className     = 'modal-status';
    document.getElementById('modalConfirmBtn').textContent = isComplete ? 'Complete Payment' : 'Release Funds';
    document.getElementById('modalConfirmBtn').disabled  = false;
    document.getElementById('modalCancelBtn').disabled   = false;
    ['pd1','pd2','pd3','pd4'].forEach(id=>{document.getElementById(id).value='';});
    document.getElementById('pinModal').classList.add('open');
    document.getElementById('pd1').focus();
}
function closeModal() { document.getElementById('pinModal').classList.remove('open'); modalContext=null; }
document.getElementById('pinModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.querySelectorAll('.pin-digit').forEach((input,idx,all)=>{
    input.addEventListener('input',function(){this.value=this.value.replace(/[^0-9]/g,'');if(this.value&&idx<all.length-1)all[idx+1].focus();});
    input.addEventListener('keydown',function(e){if(e.key==='Backspace'&&!this.value&&idx>0)all[idx-1].focus();if(e.key==='Enter')submitModal();});
    input.addEventListener('keypress',function(e){if(!/[0-9]/.test(e.key))e.preventDefault();});
});
function getModalPin(){return ['pd1','pd2','pd3','pd4'].map(id=>document.getElementById(id)?.value||'').join('');}
async function submitModal(){
    if(!modalContext)return;
    const pin=getModalPin();
    if(pin.length!==4){setModalStatus('Enter your 4-digit PIN',false);return;}
    const confirmBtn=document.getElementById('modalConfirmBtn');
    const cancelBtn=document.getElementById('modalCancelBtn');
    confirmBtn.disabled=true;cancelBtn.disabled=true;confirmBtn.textContent='Processing…';
    const{action,orderItemId}=modalContext;
    const endpoint=action==='complete'?`/api/orders/${ORDER_ID}/items/${orderItemId}/complete-deposit/`:`/api/orders/${ORDER_ID}/items/${orderItemId}/cancel-deposit/`;
    try{
        const r=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':csrfToken},body:JSON.stringify({pin})});
        const d=await r.json();
        if(r.ok&&d.success){
            setModalStatus(action==='complete'?'✅ Payment completed!':'✅ Reservation released!',true);
            setTimeout(()=>{closeModal();updateItemCardAfterAction(orderItemId,action);showToast(action==='complete'?`Payment completed for ${modalContext.productName}`:`Reservation released for ${modalContext.productName}`,'success');},800);
        } else {
            setModalStatus(d.error||'Something went wrong.',false);
            confirmBtn.disabled=false;cancelBtn.disabled=false;
            confirmBtn.textContent=action==='complete'?'Complete Payment':'Release Funds';
            ['pd1','pd2','pd3','pd4'].forEach(id=>{document.getElementById(id).value='';});
            document.getElementById('pd1').focus();
        }
    } catch {
        setModalStatus('Network error.',false);
        confirmBtn.disabled=false;cancelBtn.disabled=false;
        confirmBtn.textContent=action==='complete'?'Complete Payment':'Release Funds';
    }
}
function setModalStatus(msg,ok){const el=document.getElementById('modalStatus');el.textContent=msg;el.className='modal-status'+(ok?' ok':'');}
function updateItemCardAfterAction(orderItemId,action){
    const card=document.getElementById(`item-card-${orderItemId}`);
    if(!card){loadOrderDetail();return;}
    if(action==='complete'){
        card.style.border='2px solid #27ae60';card.style.background='#f0faf4';
        const a=card.querySelector('.deposit-actions');
        if(a)a.innerHTML=`<div style="font-size:.82rem;color:#27ae60;font-weight:700;padding:.4rem 0;">✅ Payment completed</div>`;
        card.querySelectorAll('.status-deposited').forEach(b=>{b.className='payment-badge status-paid';b.textContent='Paid';});
    } else {
        card.style.opacity='0';card.style.transition='opacity .4s';setTimeout(()=>loadOrderDetail(),500);
    }
}

// ── Helpers ──────────────────────────────────────────────────────
function fmt(v){return Number(v).toLocaleString();}
function escJs(s){return String(s).replace(/'/g,"\\'").replace(/"/g,'\\"');}
function showToast(msg,type='error'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3500);}

loadOrderDetail();
</script>
