<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment</title>
    {% load static %}
    {% load humanize %}
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0a0a0a;
        }

        /* ============ FULLSCREEN IFRAME ============ */
        #paymentFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 1;
            background: #0a0a0a;
        }

        /* ============ FLOATING CONTROLS (top-left) ============ */
        #floatingControls {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 100;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .float-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            transition: transform 0.15s, box-shadow 0.15s;
            text-decoration: none;
            background: rgba(255,255,255,0.92);
            color: #222;
            backdrop-filter: blur(6px);
        }

        .float-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .float-btn:active {
            transform: scale(0.96);
        }

        /* ============ LOADING OVERLAY ============ */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: opacity 0.4s ease;
        }

        #loadingOverlay.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .loader-ring {
            width: 52px;
            height: 52px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #f0e040;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            color: rgba(255,255,255,0.5);
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .loader-amount {
            color: #f0e040;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            margin-top: 8px;
        }

        /* ============ STATUS OVERLAY ============ */
        #statusOverlay {
            position: fixed;
            inset: 0;
            background: #0a0a0a;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 2rem;
        }

        #statusOverlay.show {
            display: flex;
        }

        .status-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        .status-title {
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.6rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 0.75rem;
            text-align: center;
        }

        .status-subtitle {
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-bottom: 2.5rem;
            max-width: 320px;
        }

        .status-btn {
            padding: 14px 40px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: transform 0.15s;
        }

        .status-btn:hover {
            transform: translateY(-2px);
        }

        .status-btn.success {
            background: #f0e040;
            color: #0a0a0a;
        }

        .status-btn.error {
            background: #fff;
            color: #0a0a0a;
        }

        /* ============ SECURITY BADGE (bottom-right) ============ */
        #securityBadge {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(255,255,255,0.55);
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        #securityBadge .lock {
            color: #f0e040;
            font-size: 0.9rem;
        }

        /* ============ ORDER INFO PILL (top-right, fades after load) ============ */
        #orderPill {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 100;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.72rem;
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            transition: opacity 0.5s ease;
        }

        #orderPill.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #orderPill .amount-pill {
            color: #f0e040;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <!-- Fullscreen Payment Iframe -->
    <iframe
        id="paymentFrame"
        src="{{ payment_url }}"
        allow="payment; fullscreen"
        sandbox="allow-same-origin allow-scripts allow-forms allow-top-navigation allow-popups"
        title="Fair Cashier Payment Gateway">
    </iframe>

    <!-- Floating Controls (back + refresh) -->
    <div id="floatingControls">
        <button class="float-btn" id="backBtn" title="Go back" onclick="confirmBack()">←</button>
        <button class="float-btn" id="refreshBtn" title="Reload payment page" onclick="reloadFrame()">↺</button>
    </div>

    <!-- Order Info Pill -->
    <div id="orderPill">
        <span>Order {{ order_number }}</span>
        <span class="amount-pill">UGX {{ amount|floatformat:0|intcomma }}</span>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <div class="loader-ring"></div>
        <div class="loader-text">Connecting securely</div>
        <div class="loader-amount">UGX {{ amount|floatformat:0|intcomma }}</div>
    </div>

    <!-- Status Overlay (shown after postMessage) -->
    <div id="statusOverlay">
        <div class="status-icon" id="statusIcon">✅</div>
        <div class="status-title" id="statusTitle" style="color:#f0e040;">Payment Successful</div>
        <div class="status-subtitle" id="statusSubtitle">Your payment has been processed. Redirecting…</div>
        <a href="#" class="status-btn success" id="statusBtn">View Order</a>
    </div>

    <!-- Security Badge -->
    <div id="securityBadge">
        <span class="lock">🔒</span>
        Secured by Fair Cashier
    </div>

    <script>
        const FAIR_CASHIER_DOMAIN = '{{ fair_cashier_domain }}';
        const REQUEST_ID = '{{ request_id }}';
        const ORDER_NUMBER = '{{ order_number }}';

        let paymentCompleted = false;

        // ============ IFRAME LOAD ============
        const frame = document.getElementById('paymentFrame');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const orderPill = document.getElementById('orderPill');

        frame.addEventListener('load', function () {
            setTimeout(() => {
                loadingOverlay.classList.add('fade-out');
                // Fade out order pill after 4s
                setTimeout(() => orderPill.classList.add('fade-out'), 4000);
            }, 600);
        });

        frame.addEventListener('error', function () {
            showStatus('error', '⚠️', 'Failed to Load', 'Could not reach the payment gateway. Please try again.', 'Go Back', () => {
                window.location.href = '/cart/';
            });
        });

        // ============ POSTMESSAGE HANDLER ============
        window.addEventListener('message', function (event) {
            const isDev = event.origin.includes('localhost') || event.origin.includes('127.0.0.1');
            const isTrusted = event.origin === FAIR_CASHIER_DOMAIN;
            if (!isDev && !isTrusted) return;

            if (paymentCompleted) return;

            const data = event.data;

            if (data.type === 'payment_success') {
                paymentCompleted = true;
                showStatus(
                    'success', '✅', 'Payment Successful!',
                    'Your order has been confirmed. Redirecting…',
                    'View Order',
                    () => { window.location.href = `/payment/return/?request_id=${REQUEST_ID}&status=success`; }
                );
                setTimeout(() => {
                    window.location.href = `/payment/return/?request_id=${REQUEST_ID}&status=success`;
                }, 2500);
            }

            else if (data.type === 'payment_escrowed') {
                // Buyer paid → funds held in seller's reserved balance until delivery confirmed
                paymentCompleted = true;
                showStatus(
                    'success', '🔒', 'Payment Secured!',
                    'Funds are held safely in escrow. The seller will be paid once you confirm delivery.',
                    'View Order',
                    () => { window.location.href = `/payment/return/?request_id=${REQUEST_ID}&status=escrowed`; }
                );
                setTimeout(() => {
                    window.location.href = `/payment/return/?request_id=${REQUEST_ID}&status=escrowed`;
                }, 3000);
            }

            else if (data.type === 'payment_deposited') {
                // Buyer reserved funds in own wallet (old flow)
                paymentCompleted = true;
                showStatus(
                    'success', '💰', 'Funds Reserved!',
                    'Money has been secured in your wallet. The seller can see your funds are ready.',
                    'View Order',
                    () => { window.location.href = `/payment/return/?request_id=${REQUEST_ID}&status=deposited`; }
                );
                setTimeout(() => {
                    window.location.href = `/payment/return/?request_id=${REQUEST_ID}&status=deposited`;
                }, 3000);
            }

            else if (data.type === 'payment_mixed') {
                // Mix of escrowed + deposited items
                paymentCompleted = true;
                showStatus(
                    'success', '✅', 'Payment Processed!',
                    'Your payment has been secured. Funds are held until you confirm delivery.',
                    'View Order',
                    () => { window.location.href = `/payment/return/?request_id=${REQUEST_ID}&status=escrowed`; }
                );
                setTimeout(() => {
                    window.location.href = `/payment/return/?request_id=${REQUEST_ID}&status=escrowed`;
                }, 2500);
            }

            else if (data.type === 'payment_cancelled') {
                paymentCompleted = true;
                window.location.href = `/payment/return/?request_id=${REQUEST_ID}&status=cancelled`;
            }

            else if (data.type === 'payment_failed') {
                paymentCompleted = true;
                showStatus(
                    'error', '❌', 'Payment Failed',
                    data.message || 'An error occurred during payment. Please try again.',
                    'Try Again',
                    () => { window.location.href = '/cart/'; }
                );
            }
        });

        // ============ FLOATING BUTTON ACTIONS ============
        function confirmBack() {
            if (paymentCompleted) { window.location.href = '/orders/'; return; }
            if (confirm('Payment is in progress. Go back anyway? Your order will be cancelled.')) {
                window.location.href = `/payment/return/?request_id=${REQUEST_ID}&status=cancelled`;
            }
        }

        function reloadFrame() {
            if (paymentCompleted) return;
            loadingOverlay.classList.remove('fade-out');
            frame.src = frame.src;
        }

        // ============ STATUS OVERLAY ============
        function showStatus(type, icon, title, subtitle, btnLabel, btnAction) {
            document.getElementById('statusIcon').textContent = icon;
            const titleEl = document.getElementById('statusTitle');
            titleEl.textContent = title;
            titleEl.style.color = type === 'success' ? '#f0e040' : '#ff5555';
            document.getElementById('statusSubtitle').textContent = subtitle;

            const btn = document.getElementById('statusBtn');
            btn.textContent = btnLabel;
            btn.className = `status-btn ${type}`;
            btn.onclick = (e) => { e.preventDefault(); btnAction(); };

            // Hide iframe, show overlay
            frame.style.opacity = '0';
            loadingOverlay.classList.add('fade-out');
            document.getElementById('statusOverlay').classList.add('show');
        }

        // ============ KEEP SESSION ALIVE ============
        setInterval(() => {
            if (!paymentCompleted) {
                fetch('/api/csrf/', { credentials: 'include' }).catch(() => {});
            }
        }, 60000);

        // ============ NAVIGATION GUARD ============
        window.addEventListener('beforeunload', function (e) {
            if (!paymentCompleted) {
                e.preventDefault();
                e.returnValue = 'Payment in progress. Leave?';
                return e.returnValue;
            }
        });
    </script>
</body>
</html>
