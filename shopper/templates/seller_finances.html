{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finances & Cashout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            color: #333;
        }

        .page-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .iframe-fill {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .iframe-fill iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Floating action buttons */
        .fab-group {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 1000;
        }

        .fab {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.25);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            font-size: 1.2rem;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .fab-back {
            background: white;
            color: #667eea;
        }

        .fab-refresh {
            background: #667eea;
            color: white;
        }

        /* Loading / error overlays */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            z-index: 10;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .overlay p {
            font-size: 1.1rem;
            color: #666;
        }

        .error-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            padding: 1.5rem 2rem;
            border-radius: 8px;
            text-align: center;
            max-width: 420px;
        }

        .error-box h3 {
            color: #856404;
            margin-bottom: 0.5rem;
        }

        .error-box p {
            color: #856404;
            margin-bottom: 1rem;
            font-size: 0.95rem;
        }

        .retry-button {
            background: #667eea;
            color: white;
            padding: 0.6rem 1.4rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .retry-button:hover {
            background: #5568d3;
        }
    </style>
    <link rel="stylesheet" href="{% static 'css/navbar.css' %}" />
</head>
<body>
    <div class="page-wrapper">
        {% include "navbar_base.html" %}

        <div class="iframe-fill">
            <div id="loadingMessage" class="overlay">
                <div class="loading-spinner"></div>
                <p>Connecting to Fair Cashier payment system...</p>
            </div>

            <div id="errorMessage" class="overlay" style="display: none;">
                <div class="error-box">
                    <h3>Connection Error</h3>
                    <p id="errorText">Failed to load Fair Cashier. Please try again.</p>
                    <button class="retry-button" onclick="retryLoad()">Retry</button>
                </div>
            </div>

            <iframe
                id="financesIframe"
                src="{{ iframe_url }}"
                style="display:none;"
                sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
                allow="payment"
            ></iframe>
        </div>
    </div>

    <!-- Floating action buttons -->
    <div class="fab-group">
        <a href="/seller/dashboard/" class="fab fab-back" title="Back to Dashboard">&#8592;</a>
        <button class="fab fab-refresh" title="Refresh" onclick="retryLoad()">&#8635;</button>
    </div>

    <script src="{% static 'js/navbar.js' %}"></script>
    <script>
        const iframe = document.getElementById('financesIframe');
        const loadingMessage = document.getElementById('loadingMessage');
        const errorMessage = document.getElementById('errorMessage');
        
        let loadTimeout;
        let hasLoaded = false;

        // Listen for messages from iframe
        window.addEventListener('message', function(event) {
            // Verify origin
            const allowedOrigin = '{{ fair_cashier_domain }}';
            if (event.origin !== allowedOrigin) {
                console.warn('Message from unexpected origin:', event.origin);
                return;
            }

            const data = event.data;

            // Handle different message types
            if (data.type === 'pin_setup_ready' || data.type === 'pin_login_ready') {
                console.log('✅ Fair Cashier page ready');
                hasLoaded = true;
                clearTimeout(loadTimeout);
                showIframe();
            } else if (data.type === 'account_created' || data.type === 'login_success') {
                console.log('✅ Authentication successful');
                hasLoaded = true;
                clearTimeout(loadTimeout);
                showIframe();
            } else if (data.type === 'error') {
                console.error('❌ Error from Fair Cashier:', data.message);
                showError(data.message || 'An error occurred');
            }
        });

        // Handle iframe load event
        iframe.onload = function() {
            console.log('📄 Iframe loaded');
            
            // Give it a moment for scripts to execute
            setTimeout(() => {
                if (!hasLoaded) {
                    hasLoaded = true;
                    clearTimeout(loadTimeout);
                    showIframe();
                }
            }, 500);
        };

        // Handle iframe error
        iframe.onerror = function() {
            console.error('❌ Iframe failed to load');
            showError('Failed to connect to Fair Cashier');
        };

        // Timeout fallback (15 seconds)
        loadTimeout = setTimeout(() => {
            if (!hasLoaded) {
                console.error('⏱️ Iframe load timeout');
                showError('Connection timeout. Please check your internet connection.');
            }
        }, 15000);

        function showIframe() {
            loadingMessage.style.display = 'none';
            errorMessage.style.display = 'none';
            iframe.style.display = 'block';
        }

        function showError(message) {
            loadingMessage.style.display = 'none';
            iframe.style.display = 'none';
            errorMessage.style.display = 'flex';
            document.getElementById('errorText').textContent = message;
        }

        function retryLoad() {
            hasLoaded = false;
            errorMessage.style.display = 'none';
            loadingMessage.style.display = 'flex';
            
            // Reload iframe
            iframe.src = iframe.src;
            
            // Reset timeout
            clearTimeout(loadTimeout);
            loadTimeout = setTimeout(() => {
                if (!hasLoaded) {
                    showError('Connection timeout. Please try again later.');
                }
            }, 15000);
        }

        // Log iframe URL for debugging
        console.log('🔗 Fair Cashier URL:', '{{ iframe_url }}');
    </script>
</body>
</html>
